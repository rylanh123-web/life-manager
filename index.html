<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Manager</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f7;
      padding: 20px;
      margin: 0;
      color: #111;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      margin-top: 0;
      margin-bottom: 10px;
    }

    .subtext {
      color: #555;
      margin-bottom: 16px;
      line-height: 1.45;
    }

    textarea,
    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #ddd;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
      background: white;
    }

    textarea {
      min-height: 140px;
      resize: vertical;
    }

    .button-row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    button {
      padding: 10px 14px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 700;
    }

    .primary-btn {
      background: #111;
      color: white;
    }

    .secondary-btn {
      background: #ececf3;
      color: #111;
    }

    .ghost-btn {
      background: white;
      color: #111;
      border: 1px solid #ddd;
    }

    button:disabled,
    textarea:disabled,
    input:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-bottom: 18px;
      font-size: 14px;
      color: #555;
      min-height: 20px;
    }

    .warning {
      display: none;
      background: #fff3cd;
      color: #7a5a00;
      border: 1px solid #ffe69c;
      padding: 12px;
      border-radius: 10px;
      margin-bottom: 14px;
      line-height: 1.45;
    }

    .warning.show {
      display: block;
    }

    .card {
      background: white;
      padding: 14px;
      margin-bottom: 12px;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
    }

    .card h3 {
      margin-top: 0;
      margin-bottom: 8px;
      text-transform: capitalize;
    }

    .busy-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      margin-bottom: 10px;
      background: #ececf3;
      color: #333;
    }

    .busy-badge.busy {
      background: #eef2ff;
      color: #3730a3;
    }

    .section-title {
      margin: 20px 0 10px;
      font-size: 20px;
      font-weight: 700;
    }

    .mini-label {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #666;
      font-weight: 700;
      margin-top: 10px;
      margin-bottom: 6px;
    }

    ul {
      margin-top: 8px;
      margin-bottom: 0;
      padding-left: 18px;
    }

    li {
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .meal-chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 8px;
    }

    .meal-chip {
      border: 1px solid #ddd;
      background: #fffaf0;
      color: #111;
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 700;
      cursor: pointer;
    }

    .meal-chip:hover {
      background: #fff3db;
    }

    .empty-text {
      color: #777;
      font-style: italic;
    }

    .modal-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      display: none;
      align-items: center;
      justify-content: center;
      padding: 20px;
      z-index: 999;
    }

    .modal-backdrop.show {
      display: flex;
    }

    .modal {
      background: white;
      width: 100%;
      max-width: 620px;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.22);
      max-height: 85vh;
      overflow-y: auto;
    }

    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .modal-title {
      font-size: 24px;
      font-weight: 800;
      margin: 0;
    }

    .modal-subtitle {
      color: #666;
      font-size: 14px;
      margin-top: 4px;
      line-height: 1.45;
    }

    .close-btn {
      background: #ececf3;
      color: #111;
      min-width: 42px;
      padding: 10px 12px;
    }

    .recipe-meta {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      padding: 6px 10px;
      border-radius: 999px;
      background: #f3f4f6;
      color: #333;
      margin-bottom: 14px;
    }

    .modal-loading {
      color: #555;
      line-height: 1.5;
      padding: 18px 0;
    }

    .modal-section-title {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #666;
      font-weight: 700;
      margin-top: 16px;
      margin-bottom: 8px;
    }

    .modal-list {
      margin: 0;
      padding-left: 18px;
    }

    .copyable-box {
      background: #fafafa;
      border: 1px solid #e5e5e5;
      border-radius: 10px;
      padding: 12px;
      line-height: 1.5;
      white-space: pre-wrap;
    }

    @media (max-width: 700px) {
      body {
        padding: 14px;
      }

      .button-row {
        flex-direction: column;
      }

      .button-row button {
        width: 100%;
      }

      .modal {
        padding: 14px;
      }

      .modal-title {
        font-size: 20px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Life Manager</h1>
    <div class="subtext">
      Turn a messy brain dump into a usable week. Generate your plan, edit it in plain English, click meals for simple details, and copy the week in readable text.
    </div>

    <textarea id="brainDump" placeholder="Dump your week here... work schedule, gym, appointments, groceries, food dislikes, events, everything."></textarea>

    <div class="button-row">
      <button id="generateBtn" class="primary-btn">Generate</button>
      <button id="copyReadableBtn" class="ghost-btn" disabled>Copy Readable Plan</button>
    </div>

    <input id="quickEditInput" placeholder="make Thursday lighter, swap dinner to tacos" />

    <div class="button-row">
      <button id="applyEditBtn" class="secondary-btn">Apply Edit</button>
      <button id="undoBtn" class="ghost-btn" disabled>Undo</button>
    </div>

    <div id="status" class="status"></div>
    <div id="warningBanner" class="warning"></div>

    <div id="plan"></div>
  </div>

  <div id="mealModalBackdrop" class="modal-backdrop">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h2 id="mealModalTitle" class="modal-title">Meal Details</h2>
          <div id="mealModalSubtitle" class="modal-subtitle"></div>
        </div>
        <button id="closeMealModalBtn" class="close-btn" type="button">✕</button>
      </div>

      <div id="mealModalContent"></div>
    </div>
  </div>

  <script>
    let currentPlan = null;
    let lastPlan = null;
    let mealDetailCache = {};

    const STORAGE_KEYS = {
      plan: "lifeManagerPlan",
      brainDump: "lifeManagerBrainDump",
      mealDetailCache: "lifeManagerMealDetailCache"
    };

    const brainDumpEl = document.getElementById("brainDump");
    const quickEditInputEl = document.getElementById("quickEditInput");
    const generateBtn = document.getElementById("generateBtn");
    const applyEditBtn = document.getElementById("applyEditBtn");
    const undoBtn = document.getElementById("undoBtn");
    const copyReadableBtn = document.getElementById("copyReadableBtn");
    const statusEl = document.getElementById("status");
    const warningBannerEl = document.getElementById("warningBanner");
    const planEl = document.getElementById("plan");

    const mealModalBackdropEl = document.getElementById("mealModalBackdrop");
    const mealModalTitleEl = document.getElementById("mealModalTitle");
    const mealModalSubtitleEl = document.getElementById("mealModalSubtitle");
    const mealModalContentEl = document.getElementById("mealModalContent");
    const closeMealModalBtn = document.getElementById("closeMealModalBtn");

    function setStatus(message) {
      statusEl.textContent = message || "";
    }

    function showWarning(message) {
      warningBannerEl.textContent = message || "";
      warningBannerEl.classList.toggle("show", !!message);
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function saveState() {
      try {
        if (currentPlan) {
          localStorage.setItem(STORAGE_KEYS.plan, JSON.stringify(currentPlan));
        }
        localStorage.setItem(STORAGE_KEYS.brainDump, brainDumpEl.value || "");
        localStorage.setItem(STORAGE_KEYS.mealDetailCache, JSON.stringify(mealDetailCache || {}));
      } catch (error) {
        console.error("Failed to save local state", error);
      }
    }

    function loadState() {
      try {
        const savedBrainDump = localStorage.getItem(STORAGE_KEYS.brainDump);
        const savedPlan = localStorage.getItem(STORAGE_KEYS.plan);
        const savedMealCache = localStorage.getItem(STORAGE_KEYS.mealDetailCache);

        if (savedBrainDump) {
          brainDumpEl.value = savedBrainDump;
        }

        if (savedMealCache) {
          try {
            mealDetailCache = JSON.parse(savedMealCache) || {};
          } catch {
            mealDetailCache = {};
          }
        }

        if (savedPlan) {
          try {
            currentPlan = JSON.parse(savedPlan);
            render();
            copyReadableBtn.disabled = false;

            if (currentPlan?.isFallback) {
              showWarning("You are viewing a fallback plan from a previous API failure.");
            }
          } catch (error) {
            console.error("Failed to parse saved plan", error);
          }
        }
      } catch (error) {
        console.error("Failed to load local state", error);
      }
    }

    function setLoadingState(loading, label = "") {
      brainDumpEl.disabled = loading;
      quickEditInputEl.disabled = loading;
      generateBtn.disabled = loading;
      applyEditBtn.disabled = loading;
      copyReadableBtn.disabled = loading || !currentPlan;
      undoBtn.disabled = loading || !lastPlan;

      generateBtn.textContent = loading && label === "generate" ? "Loading..." : "Generate";
      applyEditBtn.textContent = loading && label === "quickEdit" ? "Loading..." : "Apply Edit";
    }

    function renderList(items) {
      if (!Array.isArray(items) || !items.length) {
        return "<li>None</li>";
      }

      return items.map(item => `<li>${escapeHtml(item)}</li>`).join("");
    }

    function renderMealChips(day, meals) {
      if (!Array.isArray(meals) || !meals.length) {
        return `<div class="empty-text">No meals planned.</div>`;
      }

      return `
        <div class="meal-chip-list">
          ${meals.map(meal => `
            <button
              class="meal-chip"
              data-day="${escapeHtml(day)}"
              data-meal="${escapeHtml(meal)}"
              type="button"
            >
              ${escapeHtml(meal)}
            </button>
          `).join("")}
        </div>
      `;
    }

    function attachMealChipEvents() {
      const mealChips = document.querySelectorAll(".meal-chip");

      mealChips.forEach(chip => {
        chip.addEventListener("click", () => {
          const day = chip.getAttribute("data-day");
          const meal = chip.getAttribute("data-meal");
          openMealDetails(day, meal);
        });
      });
    }

    function render() {
      if (!currentPlan) {
        planEl.innerHTML = "";
        copyReadableBtn.disabled = true;
        return;
      }

      const dayOrder = [
        "monday",
        "tuesday",
        "wednesday",
        "thursday",
        "friday",
        "saturday",
        "sunday"
      ];

      let html = "";

      for (const day of dayOrder) {
        const dayData = currentPlan[day] || { tasks: [], meals: [], busy: false };

        html += `
          <div class="card">
            <h3>${escapeHtml(day)}</h3>
            <div class="busy-badge ${dayData.busy ? "busy" : ""}">
              ${dayData.busy ? "Busy Day" : "Lighter Day"}
            </div>

            <div class="mini-label">Tasks</div>
            <ul>${renderList(dayData.tasks)}</ul>

            <div class="mini-label">Meals</div>
            ${renderMealChips(day, dayData.meals)}
          </div>
        `;
      }

      html += `
        <div class="section-title">Grocery List</div>
        <div class="card">
          <ul>${renderList(currentPlan.groceryList || [])}</ul>
        </div>
      `;

      planEl.innerHTML = html;
      copyReadableBtn.disabled = false;
      attachMealChipEvents();
    }

    function clearMealDetailsCache() {
      mealDetailCache = {};
      saveState();
    }

    async function postPlan(payload) {
      const response = await fetch("/api/plan", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (!response.ok) {
        const error = new Error(data?.error || "Request failed");
        error.fallback = data?.fallback || null;
        throw error;
      }

      return data;
    }

    async function generatePlan() {
      const brainDump = brainDumpEl.value.trim();

      if (!brainDump) {
        setStatus("Enter your brain dump first.");
        return;
      }

      try {
        setLoadingState(true, "generate");
        setStatus("Generating plan...");
        showWarning("");

        const data = await postPlan({
          mode: "generate",
          brainDump
        });

        currentPlan = data;
        lastPlan = null;
        undoBtn.disabled = true;
        clearMealDetailsCache();

        render();
        saveState();

        if (data?.isFallback) {
          showWarning("The API failed, so a fallback plan was loaded.");
        }

        setStatus("Plan generated.");
      } catch (error) {
        console.error(error);

        if (error.fallback) {
          currentPlan = error.fallback;
          lastPlan = null;
          clearMealDetailsCache();
          render();
          saveState();
          showWarning("The API failed, so a fallback empty plan was loaded.");
          setStatus("Fallback plan loaded.");
        } else {
          showWarning("Could not generate the plan right now.");
          setStatus(error.message || "Generate failed.");
        }
      } finally {
        setLoadingState(false);
      }
    }

    async function applyQuickEdit() {
      const input = quickEditInputEl.value.trim();

      if (!input) {
        setStatus("Enter an edit first.");
        return;
      }

      if (!currentPlan) {
        setStatus("Generate a plan first.");
        return;
      }

      try {
        lastPlan = JSON.parse(JSON.stringify(currentPlan));
        setLoadingState(true, "quickEdit");
        setStatus("Applying edit...");
        showWarning("");

        const data = await postPlan({
          mode: "quickEdit",
          brainDump: brainDumpEl.value.trim(),
          existingPlan: currentPlan,
          editInstruction: input
        });

        currentPlan = data;
        clearMealDetailsCache();
        render();
        saveState();
        undoBtn.disabled = false;

        if (data?.isFallback) {
          showWarning("The API failed, so a fallback empty plan was loaded.");
        }

        setStatus("Edit applied.");
      } catch (error) {
        console.error(error);

        if (error.fallback) {
          currentPlan = error.fallback;
          clearMealDetailsCache();
          render();
          saveState();
          showWarning("The API failed while applying your edit, so a fallback empty plan was loaded.");
          setStatus("Fallback plan loaded.");
        } else {
          showWarning("Could not apply the edit right now.");
          setStatus(error.message || "Edit failed.");
        }
      } finally {
        setLoadingState(false);
      }
    }

    function undoEdit() {
      if (!lastPlan) return;

      currentPlan = lastPlan;
      lastPlan = null;
      clearMealDetailsCache();
      render();
      saveState();
      undoBtn.disabled = true;
      showWarning("");
      setStatus("Undo complete.");
    }

    function openMealModal(title, subtitle) {
      mealModalTitleEl.textContent = title || "Meal Details";
      mealModalSubtitleEl.textContent = subtitle || "";
      mealModalBackdropEl.classList.add("show");
    }

    function closeMealModal() {
      mealModalBackdropEl.classList.remove("show");
      mealModalTitleEl.textContent = "Meal Details";
      mealModalSubtitleEl.textContent = "";
      mealModalContentEl.innerHTML = "";
    }

    function mealCacheKey(dayName, mealName) {
      return `${String(dayName).toLowerCase()}__${String(mealName).toLowerCase()}`;
    }

    function renderMealDetailsContent(details) {
      const ingredientsHtml = Array.isArray(details.ingredients) && details.ingredients.length
        ? `<ul class="modal-list">${details.ingredients.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ul>`
        : `<div class="empty-text">No ingredients needed.</div>`;

      const stepsHtml = Array.isArray(details.steps) && details.steps.length
        ? `<ol class="modal-list">${details.steps.map(item => `<li>${escapeHtml(item)}</li>`).join("")}</ol>`
        : `<div class="empty-text">No steps needed.</div>`;

      mealModalContentEl.innerHTML = `
        ${details.prepTime ? `<div class="recipe-meta">${escapeHtml(details.prepTime)}</div>` : ""}
        ${details.description ? `<div class="copyable-box">${escapeHtml(details.description)}</div>` : ""}
        <div class="modal-section-title">Ingredients</div>
        ${ingredientsHtml}
        <div class="modal-section-title">Steps</div>
        ${stepsHtml}
      `;
    }

    async function openMealDetails(dayName, mealName) {
      if (!currentPlan) return;

      const cacheKey = mealCacheKey(dayName, mealName);
      openMealModal(mealName, `${dayName.charAt(0).toUpperCase() + dayName.slice(1)} meal`);

      if (mealDetailCache[cacheKey]) {
        renderMealDetailsContent(mealDetailCache[cacheKey]);
        return;
      }

      mealModalContentEl.innerHTML = `
        <div class="modal-loading">
          Building recipe details for <strong>${escapeHtml(mealName)}</strong>...
        </div>
      `;

      try {
        const data = await postPlan({
          mode: "mealDetails",
          brainDump: brainDumpEl.value.trim(),
          existingPlan: currentPlan,
          mealName,
          dayName
        });

        mealDetailCache[cacheKey] = data;
        saveState();
        renderMealDetailsContent(data);
      } catch (error) {
        console.error(error);
        mealModalContentEl.innerHTML = `
          <div class="copyable-box">
            Could not load meal details right now.
          </div>
        `;
      }
    }

    async function copyReadablePlan() {
      if (!currentPlan) return;

      const days = ["monday","tuesday","wednesday","thursday","friday","saturday","sunday"];
      let text = "";

      for (const day of days) {
        const dayData = currentPlan[day] || { tasks: [], meals: [], busy: false };

        text += `${capitalize(day)}\n`;
        text += `${dayData.busy ? "Busy Day" : "Lighter Day"}\n\n`;

        text += "Tasks:\n";
        if (dayData.tasks.length) {
          dayData.tasks.forEach(task => {
            text += `- ${task}\n`;
          });
        } else {
          text += "- None\n";
        }

        text += "\nMeals:\n";
        if (dayData.meals.length) {
          dayData.meals.forEach(meal => {
            text += `- ${meal}\n`;
          });
        } else {
          text += "- None\n";
        }

        text += "\n-------------------\n\n";
      }

      text += "Grocery List:\n";
      if (currentPlan.groceryList.length) {
        currentPlan.groceryList.forEach(item => {
          text += `- ${item}\n`;
        });
      } else {
        text += "- None\n";
      }

      try {
        await navigator.clipboard.writeText(text);
        setStatus("Readable plan copied.");
      } catch (error) {
        console.error(error);
        setStatus("Could not copy plan.");
      }
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    generateBtn.addEventListener("click", generatePlan);
    applyEditBtn.addEventListener("click", applyQuickEdit);
    undoBtn.addEventListener("click", undoEdit);
    copyReadableBtn.addEventListener("click", copyReadablePlan);
    closeMealModalBtn.addEventListener("click", closeMealModal);

    mealModalBackdropEl.addEventListener("click", (event) => {
      if (event.target === mealModalBackdropEl) {
        closeMealModal();
      }
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && mealModalBackdropEl.classList.contains("show")) {
        closeMealModal();
      }
    });

    brainDumpEl.addEventListener("input", () => {
      saveState();
    });

    loadState();
  </script>
</body>
</html>
