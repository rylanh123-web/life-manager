<script>
const API = "";

let state = {
  plan: null,
  votes: []
};

function getToken() {
  return localStorage.getItem("lm.token");
}

function getAuthHeaders(includeJson = false) {
  const headers = {};

  if (includeJson) {
    headers["Content-Type"] = "application/json";
  }

  const token = getToken();
  if (token) {
    headers["Authorization"] = `Bearer ${token}`;
  }

  return headers;
}

/* =========================
   🔥 CRITICAL FIX HERE
========================= */

async function voteMeal(day, meal) {
  try {
    const userRes = await fetch("/api/user/me", {
      headers: getAuthHeaders()
    });

    const user = await userRes.json();

    if (!user.family_id) {
      alert("Join a family first");
      return;
    }

    const res = await fetch("/api/votes", {
      method: "POST",
      headers: getAuthHeaders(true),
      body: JSON.stringify({
        family_id: user.family_id,
        week_start: getWeekStart(),
        day,
        meal
      })
    });

    const data = await res.json();

    console.log("VOTE RESPONSE:", data); // 👈 IMPORTANT

    if (res.ok) {
      await loadVotes();
    } else {
      alert(
        "Vote failed:\n\n" +
        JSON.stringify(data, null, 2)
      );
    }

  } catch (e) {
    console.error("vote failed", e);
    alert("Vote failed:\n\n" + e.message);
  }
}
</script>
