<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Manager</title>

<style>
body {
  font-family: Arial;
  background: #0f1115;
  color: white;
  padding: 20px;
}

.card {
  background: #1a1d24;
  padding: 20px;
  border-radius: 12px;
  margin-bottom: 20px;
}

.hidden { display: none; }

button {
  margin: 5px;
  padding: 10px 14px;
  border-radius: 8px;
  border: none;
  background: #2a2f3a;
  color: white;
  cursor: pointer;
}

button.primary {
  background: #6cb2ff;
  color: black;
}

input, textarea {
  width: 100%;
  max-width: 600px;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #333;
  background: #11151c;
  color: white;
}

.meal-row {
  display: flex;
  justify-content: space-between;
  padding: 8px;
  margin-bottom: 4px;
}

.winner {
  background: #1f3a2a;
  border-radius: 6px;
}
</style>
</head>

<body>

<div id="auth" class="card">
  <h2>Login / Register</h2>
  <input id="email" placeholder="email"><br><br>
  <input id="password" placeholder="password" type="password"><br><br>
  <button onclick="login()">Login</button>
  <button onclick="register()">Register</button>
</div>

<div id="app" class="hidden">

  <div class="card">
    <h2>Family</h2>
    <button onclick="createFamily()">Create Family</button>
    <input id="joinCode" placeholder="Join code">
    <button onclick="joinFamily()">Join Family</button>
    <button onclick="logout()">Logout</button>
    <p id="familyInfo">No family yet.</p>
  </div>

  <div class="card">
    <h2>Plan</h2>
    <textarea id="brainDump"></textarea><br><br>
    <button class="primary" onclick="generatePlan()">Generate Plan</button>
    <p id="status"></p>
  </div>

  <div id="plan" class="card hidden">
    <h2>Weekly Plan</h2>
    <div id="planContent"></div>
  </div>

</div>

<script>
let state = { plan: null, votes: [] }

function getToken() {
  return localStorage.getItem("lm.token")
}

function getAuthHeaders(json=false){
  const h = {}
  if(json) h["Content-Type"]="application/json"
  h["Authorization"] = "Bearer " + getToken()
  return h
}

function logout(){
  localStorage.clear()
  location.reload()
}

async function login(){
  const res = await fetch("/api/auth/login",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  })
  const data = await res.json()
  localStorage.setItem("lm.token",data.token)
  init()
}

async function register(){
  const res = await fetch("/api/auth/register",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({
      email:email.value,
      password:password.value
    })
  })
  const data = await res.json()
  localStorage.setItem("lm.token",data.token)
  init()
}

async function createFamily(){
  await fetch("/api/family/create",{
    method:"POST",
    headers:getAuthHeaders(true)
  })
  loadFamily()
}

async function joinFamily(){
  await fetch("/api/family/join",{
    method:"POST",
    headers:getAuthHeaders(true),
    body:JSON.stringify({code:joinCode.value})
  })
  loadFamily()
}

async function loadFamily(){
  const userRes = await fetch("/api/user/me",{headers:getAuthHeaders()})
  const user = await userRes.json()

  if(!user.family_id){
    familyInfo.innerText="No family"
    return
  }

  const res = await fetch("/api/family/"+user.family_id)
  const data = await res.json()

  familyInfo.innerText="Code: "+data.family.code
}

async function generatePlan(){
  const res = await fetch("/api/plan",{
    method:"POST",
    headers:{"Content-Type":"application/json"},
    body:JSON.stringify({mode:"generate",brainDump:brainDump.value})
  })
  const data = await res.json()

  state.plan=data.plan||data
  renderPlan()
  loadVotes()
}

function voteCount(day,meal){
  return state.votes.filter(v=>v.day===day && v.meal===meal).length
}

function renderPlan(){
  plan.classList.remove("hidden")
  planContent.innerHTML=""

  Object.entries(state.plan).forEach(([day,val])=>{
    if(day==="groceryList")return

    let voteMap={}
    val.meals.forEach(m=>voteMap[m]=voteCount(day,m))

    let winner=null,max=-1
    Object.entries(voteMap).forEach(([m,c])=>{
      if(c>max){max=c;winner=m}
    })

    const div=document.createElement("div")
    div.innerHTML="<h3>"+day+"</h3>"

    val.meals.forEach(m=>{
      const row=document.createElement("div")
      row.className="meal-row"+(m===winner&&voteMap[m]>0?" winner":"")

      row.innerHTML=`
        <span>${m} ${m===winner&&voteMap[m]>0?"✅":""}</span>
        <button onclick="voteMeal('${day}','${m}')">👍 ${voteMap[m]}</button>
      `
      div.appendChild(row)
    })

    planContent.appendChild(div)
  })
}

async function loadVotes(){
  const user = await (await fetch("/api/user/me",{headers:getAuthHeaders()})).json()
  if(!user.family_id)return

  const res = await fetch(`/api/votes?family_id=${user.family_id}&week_start=2024-01-01`,{
    headers:getAuthHeaders()
  })
  const data = await res.json()

  state.votes=data.votes||[]
  renderPlan()
}

async function voteMeal(day,meal){
  const user = await (await fetch("/api/user/me",{headers:getAuthHeaders()})).json()

  await fetch("/api/votes",{
    method:"POST",
    headers:getAuthHeaders(true),
    body:JSON.stringify({
      family_id:user.family_id,
      week_start:"2024-01-01",
      day,meal
    })
  })

  loadVotes()
}

function init(){
  if(getToken()){
    auth.classList.add("hidden")
    app.classList.remove("hidden")
    loadFamily()
    loadVotes()
  }
}

init()
</script>

</body>
</html>
