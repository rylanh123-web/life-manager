<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Life Manager</title>

<style>
:root {
 --bg:#0f1115;
 --panel:#171a21;
 --panel-2:#1f2430;
 --border:rgba(255,255,255,0.08);
 --text:#f4f7fb;
 --muted:#a7b0c0;
 --accent:#8bc5ff;
}

body {
 margin:0;
 font-family:Inter,system-ui;
 background:linear-gradient(180deg,#0d1016,#111621);
 color:var(--text);
}

.app { max-width:1100px; margin:auto; padding:20px; }

.card {
 background:var(--panel);
 border:1px solid var(--border);
 border-radius:16px;
 padding:16px;
 margin-bottom:16px;
}

.hidden { display:none !important; }

textarea {
 width:100%;
 min-height:140px;
 background:var(--panel);
 border:1px solid var(--border);
 color:var(--text);
 border-radius:12px;
 padding:12px;
}

.btn {
 background:var(--panel-2);
 border:1px solid var(--border);
 color:var(--text);
 padding:10px 14px;
 border-radius:999px;
 cursor:pointer;
}

.btn-primary {
 background:linear-gradient(180deg,#a7d6ff,#83c3ff);
 color:#0c1422;
 border:0;
}

.day {
 margin-top:10px;
 padding:12px;
 background:var(--panel-2);
 border-radius:12px;
}

.meal {
 display:flex;
 gap:6px;
 margin-top:6px;
 flex-wrap:wrap;
}

.chip {
 background:rgba(139,197,255,.1);
 padding:6px 10px;
 border-radius:999px;
}

.modal {
 position:fixed;
 inset:0;
 background:rgba(0,0,0,.6);
 display:flex;
 align-items:center;
 justify-content:center;
}

.modal-inner {
 background:#121722;
 padding:16px;
 border-radius:12px;
 width:400px;
}
</style>
</head>

<body>
<div class="app">

<!-- AUTH -->
<div id="auth" class="card">
<h3>Login / Register</h3>
<input id="email" placeholder="email"><br><br>
<input id="password" placeholder="password" type="password"><br><br>
<button class="btn" onclick="login()">Login</button>
<button class="btn" onclick="register()">Register</button>
</div>

<!-- FAMILY -->
<div id="family" class="card hidden">
<h3>Family</h3>
<button class="btn" onclick="createFamily()">Create</button>
<input id="code" placeholder="Join code">
<button class="btn" onclick="joinFamily()">Join</button>
<div id="familyInfo"></div>
</div>

<!-- HERO -->
<div id="hero" class="card hidden">
<h1>Turn chaos into a clear week</h1>
<textarea id="brain"></textarea><br><br>
<button class="btn btn-primary" onclick="generate()">Generate Plan</button>
<button class="btn" onclick="exportGrocery()">Export Grocery</button>
</div>

<!-- EDITS -->
<div id="edits" class="card hidden">
<button class="btn" onclick="quickEdit('Make dinners faster')">Faster</button>
<button class="btn" onclick="quickEdit('Make meals cheaper')">Cheaper</button>
<button class="btn" onclick="quickEdit('Add more protein')">Protein</button>
<input id="editInput" placeholder="Custom edit">
<button class="btn" onclick="applyEdit()">Apply</button>
</div>

<!-- PLAN -->
<div id="plan"></div>

<!-- GROCERY -->
<div id="grocery" class="card hidden"></div>

<!-- MODAL -->
<div id="modal" class="modal hidden">
<div class="modal-inner">
<h3 id="modalTitle"></h3>
<pre id="modalBody"></pre>
<button class="btn" onclick="closeModal()">Close</button>
</div>
</div>

</div>

<script>
let state = JSON.parse(localStorage.getItem("lm") || "{}")

function save(){ localStorage.setItem("lm", JSON.stringify(state)) }

async function api(path, method, body){
 const res = await fetch(path,{
  method,
  headers:{
   "Content-Type":"application/json",
   Authorization: state.token ? `Bearer ${state.token}` : ""
  },
  body: body ? JSON.stringify(body) : undefined
 })
 return res.json()
}

async function register(){
 const email = emailEl().value
 const password = pwEl().value
 const d = await api("/api/auth/register","POST",{email,password})
 state.token = d.token
 init()
}

async function login(){
 const email = emailEl().value
 const password = pwEl().value
 const d = await api("/api/auth/login","POST",{email,password})
 state.token = d.token
 init()
}

async function init(){
 if(!state.token) return
 state.user = await api("/api/user/me","GET")
 auth().classList.add("hidden")
 family().classList.remove("hidden")
 hero().classList.remove("hidden")
 edits().classList.remove("hidden")
 save()
}

async function createFamily(){
 state.family = await api("/api/family/create","POST",{})
 renderFamily()
}

async function joinFamily(){
 const code = document.getElementById("code").value
 state.family = await api("/api/family/join","POST",{code})
 renderFamily()
}

function renderFamily(){
 document.getElementById("familyInfo").innerText = JSON.stringify(state.family)
}

async function generate(){
 const brainDump = brainEl().value
 state.plan = await api("/api/plan","POST",{mode:"generate",brainDump})
 renderPlan()
 renderGrocery()
 save()
}

async function quickEdit(text){
 state.plan = await api("/api/plan","POST",{
  mode:"quickEdit",
  brainDump:brainEl().value,
  existingPlan:state.plan,
  editInstruction:text
 })
 renderPlan()
 renderGrocery()
}

function applyEdit(){
 quickEdit(document.getElementById("editInput").value)
}

function renderPlan(){
 const el = document.getElementById("plan")
 el.innerHTML = ""

 Object.entries(state.plan).forEach(([day,val])=>{
  if(day==="groceryList") return

  const div = document.createElement("div")
  div.className="day"
  div.innerHTML = `<h3>${day}</h3>`

  val.meals.forEach(m=>{
   const meal = document.createElement("div")
   meal.className="meal"
   meal.innerHTML = `
    <span class="chip">${m}</span>
    <button class="btn" onclick="vote('${day}','${m}')">👍</button>
    <button class="btn" onclick="details('${day}','${m}')">Details</button>
   `
   div.appendChild(meal)
  })

  el.appendChild(div)
 })
}

async function vote(day,meal){
 await api("/api/plan/1/vote","PUT",{day,meal})
 alert("Voted")
}

async function details(day,meal){
 const d = await api("/api/plan","POST",{
  mode:"mealDetails",
  brainDump:brainEl().value,
  existingPlan:state.plan,
  mealName:meal,
  dayName:day
 })
 openModal(meal, JSON.stringify(d,null,2))
}

function renderGrocery(){
 const g = state.plan.groceryList
 let html = ""
 Object.entries(g).forEach(([k,v])=>{
  html += `<h4>${k}</h4>${v.join(", ")}`
 })
 grocery().innerHTML = html
 grocery().classList.remove("hidden")
}

async function exportGrocery(){
 const d = await api("/api/grocery/export","GET")
 alert(JSON.stringify(d,null,2))
}

function openModal(t,b){
 modal().classList.remove("hidden")
 modalTitle().innerText=t
 modalBody().innerText=b
}
function closeModal(){ modal().classList.add("hidden") }

function emailEl(){return document.getElementById("email")}
function pwEl(){return document.getElementById("password")}
function auth(){return document.getElementById("auth")}
function family(){return document.getElementById("family")}
function hero(){return document.getElementById("hero")}
function edits(){return document.getElementById("edits")}
function brainEl(){return document.getElementById("brain")}
function grocery(){return document.getElementById("grocery")}
function modal(){return document.getElementById("modal")}
function modalTitle(){return document.getElementById("modalTitle")}
function modalBody(){return document.getElementById("modalBody")}

init()
</script>

</body>
</html>
