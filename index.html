<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Manager</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f7fb;
      color: #111;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
    }

    .panel {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
      margin-bottom: 20px;
    }

    textarea {
      width: 100%;
      min-height: 160px;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #ddd;
      font-size: 16px;
      resize: vertical;
      margin-bottom: 16px;
    }

    .button-row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    .primary-btn {
      background: #111;
      color: #fff;
    }

    .secondary-btn {
      background: #ececf3;
      color: #111;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .status {
      margin-top: 12px;
      min-height: 20px;
      font-size: 14px;
      color: #555;
    }

    .days-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      margin-top: 20px;
    }

    .day-card {
      background: #fff;
      border-radius: 16px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .day-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .day-title {
      font-size: 20px;
      font-weight: 700;
      text-transform: capitalize;
    }

    .busy-badge {
      font-size: 12px;
      font-weight: 700;
      border-radius: 999px;
      padding: 6px 10px;
      background: #eef2ff;
      color: #3730a3;
    }

    .section-label {
      margin: 14px 0 8px;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #666;
    }

    ul {
      margin: 0;
      padding-left: 18px;
    }

    li {
      margin-bottom: 6px;
      line-height: 1.4;
    }

    .empty {
      color: #888;
      font-style: italic;
    }

    .grocery-panel {
      margin-top: 20px;
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.06);
    }

    .hidden {
      display: none;
    }

    .edit-box {
      margin-top: 12px;
      border-top: 1px solid #eee;
      padding-top: 12px;
    }

    .edit-box textarea {
      min-height: 120px;
      margin-bottom: 10px;
    }

    .small-btn {
      padding: 8px 12px;
      font-size: 13px;
    }

    .card-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 14px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>Life Manager</h1>
      <textarea
        id="brainDump"
        placeholder="Dump your week here... work schedule, appointments, gym, food preferences, errands, events, everything."
      ></textarea>

      <div class="button-row">
        <button id="generateBtn" class="primary-btn">Generate Plan</button>
        <button id="regenerateMealsBtn" class="secondary-btn" disabled>Regenerate Meals</button>
      </div>

      <div id="status" class="status"></div>
    </div>

    <div id="planWrapper" class="hidden">
      <div id="daysGrid" class="days-grid"></div>

      <div class="grocery-panel">
        <div class="day-header">
          <div class="day-title">Grocery List</div>
        </div>
        <div id="groceryList"></div>
      </div>
    </div>
  </div>

  <script>
    const DAYS = [
      "monday",
      "tuesday",
      "wednesday",
      "thursday",
      "friday",
      "saturday",
      "sunday"
    ];

    const brainDumpEl = document.getElementById("brainDump");
    const generateBtn = document.getElementById("generateBtn");
    const regenerateMealsBtn = document.getElementById("regenerateMealsBtn");
    const statusEl = document.getElementById("status");
    const planWrapperEl = document.getElementById("planWrapper");
    const daysGridEl = document.getElementById("daysGrid");
    const groceryListEl = document.getElementById("groceryList");

    let currentPlan = null;

    function setStatus(message) {
      statusEl.textContent = message || "";
    }

    function setLoading(isLoading, mode = "generate") {
      generateBtn.disabled = isLoading;
      regenerateMealsBtn.disabled = isLoading || !currentPlan;

      if (isLoading && mode === "generate") {
        generateBtn.textContent = "Generating...";
      } else {
        generateBtn.textContent = "Generate Plan";
      }

      if (isLoading && mode === "regenerateMeals") {
        regenerateMealsBtn.textContent = "Regenerating Meals...";
      } else {
        regenerateMealsBtn.textContent = "Regenerate Meals";
      }
    }

    function escapeHtml(str) {
      return String(str)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderList(items) {
      if (!items || !items.length) {
        return '<div class="empty">None</div>';
      }

      return `
        <ul>
          ${items.map(item => `<li>${escapeHtml(item)}</li>`).join("")}
        </ul>
      `;
    }

    function buildEditText(dayData) {
      return JSON.stringify(
        {
          tasks: dayData.tasks,
          meals: dayData.meals,
          busy: dayData.busy
        },
        null,
        2
      );
    }

    function renderPlan(plan) {
      currentPlan = plan;
      daysGridEl.innerHTML = "";

      DAYS.forEach((day) => {
        const dayData = plan[day] || { tasks: [], meals: [], busy: false };

        const card = document.createElement("div");
        card.className = "day-card";

        card.innerHTML = `
          <div class="day-header">
            <div class="day-title">${day}</div>
            <div class="busy-badge">${dayData.busy ? "Busy" : "Lighter"}</div>
          </div>

          <div class="section-label">Tasks</div>
          <div class="tasks-list">${renderList(dayData.tasks)}</div>

          <div class="section-label">Meals</div>
          <div class="meals-list">${renderList(dayData.meals)}</div>

          <div class="card-actions">
            <button class="secondary-btn small-btn edit-toggle-btn">Edit Day</button>
          </div>

          <div class="edit-box hidden">
            <textarea class="edit-textarea">${escapeHtml(buildEditText(dayData))}</textarea>
            <div class="button-row">
              <button class="primary-btn small-btn save-day-btn">Save Day</button>
              <button class="secondary-btn small-btn cancel-day-btn">Cancel</button>
            </div>
          </div>
        `;

        const editBox = card.querySelector(".edit-box");
        const editToggleBtn = card.querySelector(".edit-toggle-btn");
        const cancelDayBtn = card.querySelector(".cancel-day-btn");
        const saveDayBtn = card.querySelector(".save-day-btn");
        const editTextarea = card.querySelector(".edit-textarea");

        editToggleBtn.addEventListener("click", () => {
          editBox.classList.toggle("hidden");
        });

        cancelDayBtn.addEventListener("click", () => {
          editTextarea.value = buildEditText(currentPlan[day]);
          editBox.classList.add("hidden");
        });

        saveDayBtn.addEventListener("click", () => {
          try {
            const parsed = JSON.parse(editTextarea.value);

            currentPlan[day] = {
              tasks: Array.isArray(parsed.tasks) ? parsed.tasks : [],
              meals: Array.isArray(parsed.meals) ? parsed.meals : [],
              busy: Boolean(parsed.busy)
            };

            renderPlan(currentPlan);
            setStatus(`${capitalize(day)} updated.`);
          } catch (error) {
            setStatus(`Invalid JSON for ${day}. Keep this format: { "tasks": [], "meals": [], "busy": true }`);
          }
        });

        daysGridEl.appendChild(card);
      });

      groceryListEl.innerHTML = renderList(plan.groceryList || []);
      planWrapperEl.classList.remove("hidden");
      regenerateMealsBtn.disabled = false;
    }

    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    async function generatePlan() {
      const brainDump = brainDumpEl.value.trim();

      if (!brainDump) {
        setStatus("Add your brain dump first.");
        return;
      }

      try {
        setLoading(true, "generate");
        setStatus("Building your week...");

        const response = await fetch("/api/plan", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            mode: "generate",
            brainDump
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data?.details || data?.error || "Failed to generate plan");
        }

        renderPlan(data);
        setStatus("Plan generated.");
      } catch (error) {
        console.error(error);
        setStatus(error.message || "Something went wrong.");
      } finally {
        setLoading(false);
      }
    }

    async function regenerateMeals() {
      const brainDump = brainDumpEl.value.trim();

      if (!brainDump) {
        setStatus("Add your brain dump first.");
        return;
      }

      if (!currentPlan) {
        setStatus("Generate a plan first.");
        return;
      }

      try {
        setLoading(true, "regenerateMeals");
        setStatus("Refreshing meals and grocery list...");

        const response = await fetch("/api/plan", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            mode: "regenerateMeals",
            brainDump,
            existingPlan: currentPlan
          })
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data?.details || data?.error || "Failed to regenerate meals");
        }

        currentPlan = {
          ...currentPlan,
          ...data
        };

        renderPlan(currentPlan);
        setStatus("Meals regenerated. Tasks stayed the same.");
      } catch (error) {
        console.error(error);
        setStatus(error.message || "Something went wrong.");
      } finally {
        setLoading(false);
      }
    }

    generateBtn.addEventListener("click", generatePlan);
    regenerateMealsBtn.addEventListener("click", regenerateMeals);
  </script>
</body>
</html>
